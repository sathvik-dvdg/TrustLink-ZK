name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

# 🚀 ADD THIS BLOCK TO GRANT PERMISSIONS
permissions:
  contents: read
  pull-requests: write

jobs:
  call-review:
    uses: sathvik-dvdg/ai-code-review-workflows/.github/workflows/gemini-review.yml@main
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}